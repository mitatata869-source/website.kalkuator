<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sederhana</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .calculator {
            background: #2c3e50;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            max-width: 320px;
            width: 100%;
        }

        .display {
            background: #34495e;
            color: #ecf0f1;
            font-size: 2.5em;
            text-align: right;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            word-break: break-all;
            overflow-wrap: break-word;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        button {
            height: 70px;
            font-size: 1.5em;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
        }

        .number {
            background: #3498db;
            color: white;
        }

        .number:hover {
            background: #2980b9;
            transform: scale(1.05);
        }

        .operator {
            background: #e74c3c;
            color: white;
        }

        .operator:hover {
            background: #c0392b;
            transform: scale(1.05);
        }

        .equals {
            background: #27ae60;
            color: white;
            grid-column: span 2;
        }

        .equals:hover {
            background: #229954;
            transform: scale(1.05);
        }

        .clear {
            background: #f39c12;
            color: white;
        }

        .clear:hover {
            background: #e67e22;
            transform: scale(1.05);
        }

        .decimal {
            background: #95a5a6;
            color: white;
        }

        .decimal:hover {
            background: #7f8c8d;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.98);
        }

        @media (max-width: 400px) {
            .calculator {
                margin: 20px;
                padding: 15px;
            }
            
            .display {
                font-size: 2em;
            }
            
            button {
                height: 60px;
                font-size: 1.3em;
            }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="deleteLast()">⌫</button>
            <button class="operator" onclick="appendToDisplay('/')">÷</button>
            <button class="operator" onclick="appendToDisplay('*')">×</button>

            <button class="number" onclick="appendToDisplay('7')">7</button>
            <button class="number" onclick="appendToDisplay('8')">8</button>
            <button class="number" onclick="appendToDisplay('9')">9</button>
            <button class="operator" onclick="appendToDisplay('-')">-</button>

            <button class="number" onclick="appendToDisplay('4')">4</button>
            <button class="number" onclick="appendToDisplay('5')">5</button>
            <button class="number" onclick="appendToDisplay('6')">6</button>
            <button class="operator" onclick="appendToDisplay('+')">+</button>

            <button class="number" onclick="appendToDisplay('1')">1</button>
            <button class="number" onclick="appendToDisplay('2')">2</button>
            <button class="number" onclick="appendToDisplay('3')">3</button>
            <button class="equals" onclick="calculate()" rowspan="2">=</button>

            <button class="number" onclick="appendToDisplay('0')" style="grid-column: span 2;">0</button>
            <button class="decimal" onclick="appendToDisplay('.')">.</button>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let currentInput = '0';
        let operator = null;
        let previousInput = null;

        function updateDisplay() {
            display.textContent = currentInput;
        }

        function appendToDisplay(value) {
            if (currentInput === '0' && value !== '.') {
                currentInput = value;
            } else {
                // Validasi: tidak boleh operator berturut-turut
                if (['+', '-', '*', '/'].includes(value)) {
                    if (['+', '-', '*', '/'].includes(currentInput.slice(-1))) {
                        return; // Jangan tambah operator jika sudah ada operator
                    }
                }
                currentInput += value;
            }
            updateDisplay();
        }

        function clearDisplay() {
            currentInput = '0';
            operator = null;
            previousInput = null;
            updateDisplay();
        }

        function deleteLast() {
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '0';
            }
            updateDisplay();
        }

        function calculate() {
            try {
                // Ganti simbol × dan ÷ dengan * dan /
                let expression = currentInput
                    .replace(/×/g, '*')
                    .replace(/÷/g, '/');
                
                // Evaluasi dengan validasi
                let result = eval(expression);
                
                // Handle desimal dengan presisi yang baik
                result = parseFloat(result.toPrecision(12));
                
                // Format hasil
                currentInput = result.toString();
                
                // Jika terlalu panjang, gunakan notasi ilmiah
                if (currentInput.length > 12) {
                    currentInput = result.toExponential(6);
                }
                
                operator = null;
                previousInput = null;
                updateDisplay();
                
            } catch (error) {
                currentInput = 'Error';
                updateDisplay();
                setTimeout(clearDisplay, 1500);
            }
        }

        // Keyboard support
        document.addEventListener('keydown', function(event) {
            const key = event.key;
            
            if (key >= '0' && key <= '9' || key === '.') {
                appendToDisplay(key);
            } else if (key === '+' || key === '-') {
                appendToDisplay(key);
            } else if (key === '*') {
                appendToDisplay('*');
            } else if (key === '/') {
                appendToDisplay('/');
            } else if (key === 'Enter' || key === '=') {
                calculate();
            } else if (key === 'Escape' || key === 'c' || key === 'C') {
                clearDisplay();
            } else if (key === 'Backspace') {
                deleteLast();
            }
        });

        // Inisialisasi
        updateDisplay();
    </script>
</body>
</html>
